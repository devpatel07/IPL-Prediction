name: Daily IPL Data Update
on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas requests
      - name: Run Pipeline
        run: python pipeline.py
      - name: Commit and Push changes
        run: |
          git config --global user.name 'IPL-Bot'
          git config --global user.email 'bot@ipl.com'
          git add phase_profiles.csv calibration_factors.json
          git commit -m "Auto-update 2026 DNA data" || exit 0
          git push
